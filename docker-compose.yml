services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: smartmath-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartmath}
      POSTGRES_USER: ${POSTGRES_USER:-smartmath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"  # 5435 host (5433=PolicyPal, 3307=Affiliate MySQL)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartmath}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartmath-net

  # ── Next.js Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartmath-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartmath}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartmath}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://smartmath.valibay.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      AUTH_TRUST_HOST: "true"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@smartmath.app}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://smartmath.valibay.com}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-en}
    ports:
      - "127.0.0.1:3002:3000"  # 3002 host (3000=PolicyPal, 8081=Affiliate Nginx)
    networks:
      - smartmath-net

  # ── Database Migrations (run once with --profile migrate) ──
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: smartmath-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartmath}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartmath}
    command: npx prisma db push
    networks:
      - smartmath-net
    profiles:
      - migrate

  # ── Cloudflare Tunnel (optional; use nginx instead) ──
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: smartmath-tunnel
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - smartmath-net
    profiles:
      - tunnel

volumes:
  postgres_data:
    driver: local

networks:
  smartmath-net:
    driver: bridge
